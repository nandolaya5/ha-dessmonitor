# Test configuration only. Formatting/linting (black, isort, flake8, mypy) are
# driven from the Makefile with explicit CLI flags and intentionally not
# configured here, to avoid changing existing tooling behaviour.
[tool.pytest.ini_options]
testpaths = ["tests"]
norecursedirs = [".git", ".venv", ".mydata"]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
addopts = "-ra"
